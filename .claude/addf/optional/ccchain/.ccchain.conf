# === ADDF ccchain スターター設定（Plan 0040 フェーズ2） ===
# Claude Code Chain: structural permission control
# https://github.com/fruitriin/EnumaElish
#
# このファイルは ADDF が ccchain（EnumaElish）を自身のドッグフーディングで運用しながら
# 実測ベースでチューニングした「エージェント駆動リポジトリ向けの出発点」です。
# `ccchain init` が生成する素のデフォルトに対して、以下の観点で調整済みです:
#   1. 破壊的な git 操作（reset --hard 等）を ask 化（settings.json の ask ルールと多層防御）
#   2. bash スクリプト実行・uv run・gh の読み取り系など、エージェント駆動開発で頻出する
#      安全な操作を allow 化（そうしないと settings: fallback: ask により大半の Bash 呼び出しで
#      確認プロンプトが出て、自律実行が事実上止まる）
#
# プロジェクト固有のビルド・テストコマンド（例: npm scripts, make target, プロジェクト固有の
# シェルスクリプト）は、このファイルにルールを追加して allow/ask/deny を調整してください。
# `ccchain test <コマンド一覧ファイル>` で実際の運用コマンド群を評価してから配線することを推奨します
# （詳細: .claude/addf/knowhow/ADDF/ccchain-dogfooding-phase1.md）。
#
# 制御構文（for/while/if 等）は ccchain の構造解析エンジンが静的解析できないため無条件で
# deny されます。ループを使う代わりに、grep の複数ファイル指定や個別コマンドの列挙に
# 倒すことを推奨します（同 knowhow 参照）。

settings:
  max_context_depth: 2
  max_rules_per_cmd: 5
  fallback: ask

# --- Templates ---

template primitive
  |,>>
    allow cat, echo, head, tail, wc, sort, uniq

template safeRead
  next: primitive
  |,>>
    allow grep, awk, sed

template bulkExec
  extends: safeRead
  |,>>
    deny rm    "Don't pipe into rm. Instead: redirect to /tmp/targets.txt, review, then xargs rm < /tmp/targets.txt"
  exec:
    deny rm    "Don't rm inside -exec. Instead: find ... -print > /tmp/targets.txt, review, then xargs rm < /tmp/targets.txt"
    allow cp, mv, touch

# --- PreToolUse Rules ---

preToolUse

# --- Safe Utilities (no side effects) ---
allow cat
  next: primitive
allow echo
allow pwd
allow diff
allow which
allow mkdir
allow wc
allow sort
allow head
allow tail
allow cp
allow chmod
  args:
    -R|--recursive: ask  "recursive chmod can affect many files"
    777: deny  "world-writable permissions (777) is dangerous"

# --- Search & Processing ---
allow ls
  next: primitive

allow find
  next: bulkExec
  args:
    -delete: deny  "find -delete is destructive. Instead: find ... -print > /tmp/targets.txt, review the list, then xargs rm < /tmp/targets.txt"

allow xargs
  next: bulkExec

allow grep
  next: safeRead

# --- Version Control ---
allow git
  args:
    ^(status|log|diff|show|branch|tag|stash|ls-files|remote|rev-parse|worktree)\b: allow
    ^(add|commit|checkout|merge|rebase|fetch|pull|clone)\b: allow
    ^reset\b.*--hard: ask  "git reset --hard discards uncommitted work"
    ^branch\b.*-D: ask  "force branch deletion"
    ^checkout\b.*--\s*\.$: ask  "discards all uncommitted changes"
    ^clean\b.*-f: ask  "force-deletes untracked files"
    ^push\b: ask  "git push requires confirmation"
    ^(filter-branch|filter-repo)\b: deny  "arbitrary code execution risk"
    ^config\b.*(editor|pager|hook): deny  "code execution via config"

# --- エージェント駆動開発で頻出する安全な運用コマンド ---
# fallback: ask だと bash <script>・uv run・gh <読み取り系> が軒並み ask になり実運用に耐えないため、
# 頻出するテスト・lint・調査系コマンドを allow する。副作用のある gh サブコマンドは ask のまま残す
allow bash
  args:
    -c\b: ask  "inline bash -c string — arbitrary code, review before allowing"

allow python3
allow uv
  args:
    ^run\b: allow

allow gh
  args:
    ^(issue|pr|release|repo)\s+(view|list|status)\b: allow
    ^(issue|pr)\s+comment\b: ask  "posts a visible comment to GitHub"
    ^release\s+create\b: ask  "creates a public GitHub Release"
    ^pr\s+(create|merge)\b: ask  "creates or merges a PR — visible to others"

# --- Build Tools ---
allow go
  args:
    ^(test|vet|build|mod|version|fmt|env|doc|tool)\b: allow
    ^(run|generate)\b: ask  "go run/generate can execute arbitrary code"

allow make
allow npm
  args:
    ^(test|run|version|ls|outdated|audit|ci)\b: allow
    ^install\b: ask  "npm install runs postinstall scripts"
    ^(publish|unpublish)\b: ask  "npm publish affects the registry"

allow cargo

# --- Destructive Commands ---
ask rm
  message: "confirm file deletion"

# --- Network ---
allow curl
  |
    deny bash   "curl | bash is not allowed"
    deny sh     "curl | sh is not allowed"
  args:
    -o\b|--output: ask  "curl writing to file requires confirmation"

# --- Dangerous ---
deny eval       "eval is not statically analyzable; write the command directly"

# --- Path Protection (deny-redirect pattern) ---
# Protect sensitive files by denying access and suggesting alternatives

allow Read
  args:
    \.env$|\.env\.: deny  ".env contains secrets. Read .env.example instead"
    \.ssh/|\.gnupg/: deny  "SSH/GPG keys should not be accessed by AI"
    node_modules/: deny  "Don't read node_modules directly. Check package.json instead"

allow Edit
  args:
    \.env$|\.env\.: deny  ".env contains secrets. Edit .env.example instead"
    node_modules/: deny  "Don't edit node_modules. Modify package.json and run npm install"
    dist/|build/|out/: deny  "Don't edit build artifacts. Modify source code instead"

allow Write
  args:
    \.env$|\.env\.: deny  ".env contains secrets. Write to .env.example instead"
    node_modules/: deny  "Don't write to node_modules. Modify package.json"
