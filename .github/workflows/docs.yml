# ADDF ドキュメントサイト（webManual）の GitHub Pages デプロイ（Plan 0039 フェーズ3）
# サイト本体は .claude/addf/webManual/（Plan 0039 置き場変更決定 2026-07-16 — docs/ は
# ダウンストリームプロジェクト自身のために空けておく）
name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - '.claude/addf/webManual/**'
      - '.claude/addf/guides/**'
      - 'scripts/sync-docs.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .claude/addf/webManual/.vitepress/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
